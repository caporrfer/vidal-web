<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crear cuenta — Vidal Barber</title>
  <link rel="icon" type="image/jpeg" href="/static/logo.jpg">
  <link rel="stylesheet" href="/static/styles.css?v={{ css_v }}">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <img class="auth-logo" src="/static/logo.jpg" alt="Vidal Barber">
    <h1>Vidal Barber</h1>
    <p class="auth-subtitle">Crea tu cuenta para reservar citas online</p>


    {% if google_enabled %}
    <a href="/auth/google" class="btn btn-ghost btn-full" style="gap:0.6rem; margin-bottom:0.75rem;">
      <svg width="18" height="18" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M44.5 20H24v8.5h11.8C34.7 33.9 30.1 37 24 37c-7.2 0-13-5.8-13-13s5.8-13 13-13c3.1 0 5.9 1.1 8.1 2.9l6.4-6.4C34.6 5.1 29.6 3 24 37 3 12.4 3 12.4 3 24s9.4 21 21 21c10.5 0 20-7.8 20-21 0-1.4-.1-2.7-.5-4z" fill="#FFC107"/>
        <path d="M6.3 14.7l7 5.1C15.1 16 19.2 13 24 13c3.1 0 5.9 1.1 8.1 2.9l6.4-6.4C34.6 5.1 29.6 3 24 3c-7.6 0-14.2 4.3-17.7 10.7z" fill="#FF3D00"/>
        <path d="M24 45c5.5 0 10.4-1.9 14.2-5.1l-6.6-5.5C29.7 36 27 37 24 37c-6 0-10.6-3.9-11.7-9.3l-7 5.3C8.4 40.6 15.6 45 24 45z" fill="#4CAF50"/>
        <path d="M44.5 20H24v8.5h11.8c-.8 2.9-2.8 5.4-5.4 7l6.6 5.5C40.8 37.6 45 31.4 45 24c0-1.4-.1-2.7-.5-4z" fill="#1976D2"/>
      </svg>
      Registrarse con Google
    </a>
    <div class="divider">o con email</div>
    {% endif %}

    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form method="post" action="/register">
      <div class="form-group">
        <label for="name">Nombre completo</label>
        <input type="text" id="name" name="name" required autocomplete="name" placeholder="María García">
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required autocomplete="email" placeholder="tu@email.com">
      </div>
      <div class="form-group">
        <label for="phone">Teléfono (opcional)</label>
        <input type="tel" id="phone" name="phone" autocomplete="tel" placeholder="612 345 678">
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" required autocomplete="new-password" placeholder="Mínimo 6 caracteres">
      </div>
      <button type="submit" class="btn btn-primary btn-full">Crear cuenta</button>
    </form>

    <div class="divider">o</div>
    <a href="/login" class="btn btn-ghost btn-full">Ya tengo cuenta</a>
  </div>
</div>
</body>
</html>

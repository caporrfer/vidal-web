<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Vidal Barber</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,500;0,6..96,700;0,6..96,800;1,6..96,400&family=Inter+Tight:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink: #0b0b0c;
    --ink-2:#141416;
    --ink-3:#1c1c1f;
    --line:#2a2a2e;
    --line-2:#3a3a40;
    --cream:#efe9df;
    --cream-2:#d9d3c7;
    --muted:#8a8680;
    --accent:#7a1f24;      /* oxblood */
    --accent-2:#a83138;
    --ok:#2e7d52;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--ink);color:var(--cream);font-family:"Inter Tight",system-ui,sans-serif;-webkit-font-smoothing:antialiased;overscroll-behavior:none}
  body{min-height:100vh}
  button{font-family:inherit;cursor:pointer;border:0;background:none;color:inherit}
  input,select,textarea{font-family:inherit}
  a{color:inherit;text-decoration:none}
  .serif{font-family:"Bodoni Moda",serif;font-weight:500;letter-spacing:-.01em}
  .mono{font-family:"JetBrains Mono",monospace}
  .app{max-width:1440px;margin:0 auto;min-height:100vh;position:relative}
  /* scrollbar */
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-thumb{background:#2a2a2e;border-radius:4px}
  ::-webkit-scrollbar-track{background:transparent}

  /* --- nav --- */
  .nav{position:sticky;top:0;z-index:50;background:rgba(11,11,12,.78);backdrop-filter:saturate(140%) blur(14px);-webkit-backdrop-filter:saturate(140%) blur(14px);border-bottom:1px solid var(--line)}
  .nav-inner{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;max-width:1440px;margin:0 auto}
  .brand{display:flex;align-items:center;gap:10px}
  .brand-mark{width:34px;height:34px;border:1px solid var(--cream);display:grid;place-items:center;font-family:"Bodoni Moda",serif;font-weight:700;letter-spacing:.04em;font-size:13px}
  .brand-name{font-family:"Bodoni Moda",serif;letter-spacing:.32em;font-size:13px;text-transform:uppercase}
  .nav-links{display:flex;gap:26px;font-size:13px;color:var(--cream-2);letter-spacing:.12em;text-transform:uppercase}
  .nav-links button{padding:6px 0;border-bottom:1px solid transparent;transition:border .2s,color .2s}
  .nav-links button:hover{border-color:var(--cream)}
  .nav-links button.active{color:var(--cream);border-color:var(--accent-2)}
  .nav-cta{display:inline-flex;align-items:center;gap:8px;padding:10px 16px;background:var(--cream);color:var(--ink);font-size:12px;letter-spacing:.18em;text-transform:uppercase;font-weight:600;transition:transform .2s,background .2s}
  .nav-cta:hover{background:#fff;transform:translateY(-1px)}
  .hamb{display:none;width:38px;height:38px;border:1px solid var(--line-2);align-items:center;justify-content:center}
  @media (max-width: 820px){
    .nav-links{display:none}
    .nav-cta{padding:9px 12px;font-size:11px}
    .hamb{display:inline-flex}
  }

  /* --- hero --- */
  .hero{position:relative;min-height:calc(100svh - 64px);display:grid;grid-template-columns:1.1fr .9fr;overflow:hidden}
  .hero-copy{padding:64px 48px 48px;display:flex;flex-direction:column;justify-content:space-between;position:relative}
  .hero-eyebrow{display:flex;align-items:center;gap:14px;font-size:12px;letter-spacing:.28em;text-transform:uppercase;color:var(--cream-2)}
  .hero-eyebrow .dot{width:6px;height:6px;border-radius:50%;background:var(--accent-2);box-shadow:0 0 0 4px rgba(168,49,56,.15)}
  .hero-title{font-family:"Bodoni Moda",serif;font-weight:500;font-size:clamp(52px,9vw,132px);line-height:.92;letter-spacing:-.02em;margin:28px 0 0}
  .hero-title em{font-style:italic;font-weight:400;color:var(--cream-2)}
  .hero-slash{display:inline-block;width:.55em;height:.05em;background:var(--accent-2);vertical-align:middle;margin:0 .15em .18em}
  .hero-tag{margin-top:28px;font-size:16px;line-height:1.55;max-width:440px;color:var(--cream-2)}
  .hero-actions{display:flex;gap:14px;margin-top:36px;flex-wrap:wrap}
  .btn-primary{padding:16px 26px;background:var(--cream);color:var(--ink);font-size:12px;letter-spacing:.2em;text-transform:uppercase;font-weight:600;display:inline-flex;align-items:center;gap:10px;transition:transform .2s}
  .btn-primary:hover{transform:translateY(-1px)}
  .btn-ghost{padding:16px 26px;border:1px solid var(--line-2);font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--cream-2);transition:border .2s,color .2s}
  .btn-ghost:hover{border-color:var(--cream);color:var(--cream)}
  .hero-meta{display:grid;grid-template-columns:repeat(3,1fr);gap:32px;margin-top:56px;padding-top:28px;border-top:1px solid var(--line);max-width:520px}
  .hero-meta .k{font-family:"Bodoni Moda",serif;font-size:28px;font-weight:500}
  .hero-meta .l{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-top:6px}

  .hero-visual{position:relative;border-left:1px solid var(--line);overflow:hidden}
  .hero-visual img{width:100%;height:100%;object-fit:cover;filter:grayscale(.15) contrast(1.03)}
  .hero-tape{position:absolute;top:24px;right:24px;background:var(--ink);border:1px solid var(--line-2);padding:10px 14px;font-size:11px;letter-spacing:.18em;text-transform:uppercase;display:flex;align-items:center;gap:10px}
  .hero-tape .live{width:8px;height:8px;border-radius:50%;background:#2e7d52;animation:pulse 1.8s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  .hero-caption{position:absolute;left:24px;bottom:24px;right:24px;display:flex;justify-content:space-between;align-items:end;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--cream)}
  .hero-caption span{background:rgba(11,11,12,.55);backdrop-filter:blur(6px);padding:6px 10px;border:1px solid rgba(239,233,223,.2)}

  /* vertical ticker */
  .hero-side{position:absolute;left:16px;top:50%;transform:translateY(-50%) rotate(-90deg);transform-origin:left center;font-size:10px;letter-spacing:.4em;text-transform:uppercase;color:var(--muted);white-space:nowrap}

  @media (max-width:900px){
    .hero{grid-template-columns:1fr;min-height:auto}
    .hero-copy{padding:40px 22px 36px;order:2}
    .hero-visual{order:1;height:62svh;border-left:0;border-bottom:1px solid var(--line)}
    .hero-side{display:none}
    .hero-meta{grid-template-columns:repeat(3,1fr);gap:16px}
    .hero-meta .k{font-size:22px}
  }

  /* --- section shell --- */
  section.block{padding:96px 48px;border-top:1px solid var(--line);position:relative}
  @media (max-width:900px){ section.block{padding:64px 22px} }
  .block-head{display:flex;align-items:baseline;justify-content:space-between;gap:24px;margin-bottom:44px;flex-wrap:wrap}
  .block-num{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--muted);letter-spacing:.2em}
  .block-title{font-family:"Bodoni Moda",serif;font-size:clamp(34px,5vw,64px);line-height:1;letter-spacing:-.01em;margin:10px 0 0;font-weight:500}
  .block-title em{font-style:italic;color:var(--cream-2);font-weight:400}
  .block-sub{color:var(--muted);font-size:14px;letter-spacing:.16em;text-transform:uppercase}

  /* --- services --- */
  .services{display:grid;grid-template-columns:repeat(4,1fr);gap:0;border:1px solid var(--line);border-right:0;border-bottom:0}
  @media (max-width:900px){.services{grid-template-columns:repeat(2,1fr)}}
  @media (max-width:560px){.services{grid-template-columns:1fr}}
  .svc{padding:28px;border-right:1px solid var(--line);border-bottom:1px solid var(--line);min-height:220px;display:flex;flex-direction:column;justify-content:space-between;position:relative;cursor:pointer;transition:background .25s}
  .svc:hover{background:#121214}
  .svc .n{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--muted);letter-spacing:.15em}
  .svc h4{font-family:"Bodoni Moda",serif;font-size:26px;margin:18px 0 8px;font-weight:500;letter-spacing:-.01em}
  .svc p{font-size:13px;color:var(--cream-2);line-height:1.5;margin:0}
  .svc .row{display:flex;justify-content:space-between;align-items:end;margin-top:18px}
  .svc .price{font-family:"Bodoni Moda",serif;font-size:22px}
  .svc .dur{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--muted);letter-spacing:.15em}
  .svc.selected{background:var(--cream);color:var(--ink)}
  .svc.selected .n,.svc.selected .dur,.svc.selected p{color:var(--ink-2)}
  .svc.selected::after{content:"✓";position:absolute;top:18px;right:18px;width:26px;height:26px;border-radius:50%;background:var(--ink);color:var(--cream);display:grid;place-items:center;font-size:13px}

  /* --- booking --- */
  .booking{display:grid;grid-template-columns:1.2fr .8fr;gap:0;border:1px solid var(--line)}
  @media (max-width:960px){.booking{grid-template-columns:1fr}}
  .booking .col{padding:28px}
  .booking .col+.col{border-left:1px solid var(--line)}
  @media (max-width:960px){.booking .col+.col{border-left:0;border-top:1px solid var(--line)}}

  .cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
  .cal-title{font-family:"Bodoni Moda",serif;font-size:22px;font-weight:500}
  .cal-nav{display:flex;gap:6px}
  .cal-nav button{width:36px;height:36px;border:1px solid var(--line-2);display:grid;place-items:center;transition:border .2s,background .2s}
  .cal-nav button:hover{border-color:var(--cream);background:#17171a}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
  .cal-dow{font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:.15em;color:var(--muted);text-align:center;padding:8px 0}
  .cal-day{aspect-ratio:1/1;border:1px solid var(--line);display:grid;place-items:center;font-size:14px;position:relative;cursor:pointer;transition:background .2s,border .2s}
  .cal-day .num{font-family:"Bodoni Moda",serif;font-size:18px}
  .cal-day.other{opacity:.25;pointer-events:none}
  .cal-day.past{opacity:.3;pointer-events:none;color:var(--muted)}
  .cal-day.closed{opacity:.4;pointer-events:none}
  .cal-day.closed::before{content:"";position:absolute;inset:10px;border-top:1px solid var(--line-2);transform:rotate(-15deg);top:50%}
  .cal-day:hover:not(.past):not(.other):not(.closed){background:#17171a;border-color:var(--cream-2)}
  .cal-day.today{border-color:var(--accent-2)}
  .cal-day.selected{background:var(--cream);color:var(--ink);border-color:var(--cream)}
  .cal-day .d{position:absolute;bottom:4px;right:5px;font-family:"JetBrains Mono",monospace;font-size:9px;color:var(--muted)}
  .cal-day.selected .d{color:var(--ink-2)}
  .cal-day.full::after{content:"";position:absolute;bottom:4px;left:5px;width:6px;height:6px;border-radius:50%;background:var(--accent-2)}

  .slots-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:16px}
  .slots-title{font-family:"Bodoni Moda",serif;font-size:22px;font-weight:500}
  .slots-date{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.15em;color:var(--muted);text-transform:uppercase}
  .slots-legend{display:flex;gap:14px;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:14px}
  .slots-legend span{display:inline-flex;align-items:center;gap:6px}
  .slots-legend i{width:8px;height:8px;display:inline-block;border:1px solid var(--line-2)}
  .slots-legend i.ok{background:transparent}
  .slots-legend i.bad{background:var(--line-2)}
  .slots-legend i.sel{background:var(--cream);border-color:var(--cream)}
  .period{font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;margin:14px 0 8px}
  .slot-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  @media (max-width:420px){.slot-grid{grid-template-columns:repeat(2,1fr)}}
  .slot{padding:12px 10px;border:1px solid var(--line-2);background:transparent;text-align:center;font-family:"JetBrains Mono",monospace;font-size:13px;letter-spacing:.05em;transition:all .15s;position:relative}
  .slot:hover:not(.taken):not(.disabled){border-color:var(--cream);background:#17171a}
  .slot.taken{color:var(--muted);border-style:dashed;cursor:not-allowed;text-decoration:line-through}
  .slot.disabled{opacity:.3;cursor:not-allowed}
  .slot.selected{background:var(--cream);color:var(--ink);border-color:var(--cream)}
  .slot-empty{padding:40px 0;text-align:center;color:var(--muted);font-size:13px}

  /* --- form --- */
  .form{display:grid;grid-template-columns:1fr 1fr;gap:0;margin-top:28px;border:1px solid var(--line)}
  @media (max-width:720px){.form{grid-template-columns:1fr}}
  .form .f{padding:20px;border-right:1px solid var(--line);border-bottom:1px solid var(--line)}
  @media (max-width:720px){.form .f{border-right:0}}
  .form .f:last-child{border-right:0}
  .form label{display:block;font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
  .form input{width:100%;background:transparent;border:0;border-bottom:1px solid var(--line-2);padding:10px 0;color:var(--cream);font-size:18px;font-family:"Bodoni Moda",serif;outline:none;transition:border .2s}
  .form input:focus{border-color:var(--cream)}
  .form input::placeholder{color:var(--muted);font-style:italic}
  .form .err{color:var(--accent-2);font-size:11px;margin-top:6px;font-family:"JetBrains Mono",monospace}
  .summary{padding:28px;background:var(--ink-2);border:1px solid var(--line);margin-top:28px;display:grid;grid-template-columns:1.5fr 1fr auto;gap:24px;align-items:center}
  @media (max-width:720px){.summary{grid-template-columns:1fr;gap:18px}}
  .summary .k{font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:.2em;color:var(--muted);text-transform:uppercase}
  .summary .v{font-family:"Bodoni Moda",serif;font-size:18px;margin-top:4px}
  .summary .v.dim{color:var(--muted);font-style:italic}
  .confirm-btn{padding:20px 28px;background:var(--cream);color:var(--ink);font-size:12px;letter-spacing:.22em;text-transform:uppercase;font-weight:700;display:inline-flex;align-items:center;gap:12px;justify-content:center;transition:transform .2s,background .2s;white-space:nowrap}
  .confirm-btn:hover:not(:disabled){transform:translateY(-1px)}
  .confirm-btn:disabled{opacity:.35;cursor:not-allowed}
  .confirm-btn.danger{background:var(--accent);color:var(--cream)}

  /* success overlay */
  .overlay{position:fixed;inset:0;background:rgba(11,11,12,.88);backdrop-filter:blur(10px);z-index:100;display:grid;place-items:center;padding:24px;animation:fade .25s ease}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .success{max-width:520px;width:100%;background:var(--ink);border:1px solid var(--line-2);padding:48px 36px;text-align:center;position:relative;animation:pop .4s cubic-bezier(.2,.8,.2,1)}
  @keyframes pop{from{transform:translateY(14px) scale(.97);opacity:0}to{transform:none;opacity:1}}
  .success .check{width:68px;height:68px;border:1px solid var(--accent-2);border-radius:50%;display:grid;place-items:center;margin:0 auto 22px;position:relative}
  .success .check::after{content:"";width:22px;height:11px;border-left:1.5px solid var(--cream);border-bottom:1.5px solid var(--cream);transform:rotate(-45deg) translate(2px,-3px)}
  .success h3{font-family:"Bodoni Moda",serif;font-size:36px;margin:0;letter-spacing:-.01em;font-weight:500}
  .success p{color:var(--cream-2);font-size:14px;margin:14px 0 26px;line-height:1.55}
  .success .ref{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--muted);letter-spacing:.15em;text-transform:uppercase;border-top:1px solid var(--line);padding-top:20px;margin-top:24px}
  .success .actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
  .success .close{position:absolute;top:14px;right:14px;width:32px;height:32px;border:1px solid var(--line);display:grid;place-items:center}

  /* --- gallery --- */
  .gallery{display:grid;grid-template-columns:repeat(12,1fr);gap:4px;grid-auto-rows:140px}
  @media (max-width:720px){.gallery{grid-auto-rows:110px}}
  .g-item{position:relative;overflow:hidden}
  .g-item img{width:100%;height:100%;object-fit:cover;filter:grayscale(.1);transition:transform .5s ease,filter .3s}
  .g-item:hover img{transform:scale(1.04);filter:grayscale(0)}
  .g-item .tag{position:absolute;left:10px;bottom:10px;font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;background:rgba(11,11,12,.65);padding:5px 8px;border:1px solid rgba(239,233,223,.2)}
  .g-1{grid-column:span 5;grid-row:span 3}
  .g-2{grid-column:span 4;grid-row:span 2}
  .g-3{grid-column:span 3;grid-row:span 2}
  .g-4{grid-column:span 4;grid-row:span 1}
  .g-5{grid-column:span 3;grid-row:span 1}
  @media (max-width:720px){
    .g-1{grid-column:span 12;grid-row:span 3}
    .g-2{grid-column:span 7;grid-row:span 2}
    .g-3{grid-column:span 5;grid-row:span 2}
    .g-4{grid-column:span 7;grid-row:span 2}
    .g-5{grid-column:span 5;grid-row:span 2}
  }

  /* --- about / footer --- */
  .about{display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:start}
  @media (max-width:900px){.about{grid-template-columns:1fr;gap:28px}}
  .about-text p{font-size:17px;line-height:1.6;color:var(--cream-2);margin:0 0 18px;max-width:48ch}
  .about-list{border-top:1px solid var(--line);margin-top:10px}
  .about-list .row{display:grid;grid-template-columns:120px 1fr auto;gap:18px;padding:16px 0;border-bottom:1px solid var(--line);font-size:14px;align-items:center}
  .about-list .k{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.2em;color:var(--muted);text-transform:uppercase}
  .about-list .v{color:var(--cream)}
  .about-list .s{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--muted);letter-spacing:.15em;text-transform:uppercase}
  .about-list .s.open{color:#9bc7a8}

  .foot{border-top:1px solid var(--line);padding:36px 48px;display:flex;justify-content:space-between;gap:24px;align-items:center;flex-wrap:wrap;font-size:12px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted)}
  @media (max-width:900px){.foot{padding:28px 22px}}
  .foot-brand{font-family:"Bodoni Moda",serif;letter-spacing:.32em;color:var(--cream)}
  .foot a{border-bottom:1px solid var(--line)}
  .foot a:hover{color:var(--cream);border-color:var(--cream)}

  /* whatsapp float */
  .wa{position:fixed;right:22px;bottom:22px;z-index:60;width:56px;height:56px;border-radius:50%;background:#1f8a4a;display:grid;place-items:center;box-shadow:0 12px 30px -8px rgba(31,138,74,.55);transition:transform .2s}
  .wa:hover{transform:scale(1.05)}
  .wa svg{width:28px;height:28px;fill:#fff}

  /* --- admin --- */
  .admin{min-height:100vh;background:#0a0a0b}
  .admin-top{display:flex;align-items:center;justify-content:space-between;padding:18px 28px;border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(10,10,11,.92);backdrop-filter:blur(12px);z-index:10}
  .admin-title{display:flex;align-items:center;gap:18px}
  .admin-title .tag{font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:.2em;color:var(--accent-2);text-transform:uppercase;border:1px solid var(--accent);padding:4px 8px}
  .admin-tabs{display:flex;gap:4px;padding:14px 28px 0}
  .admin-tab{padding:10px 14px;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);border:1px solid transparent;border-bottom:0;background:transparent}
  .admin-tab.active{color:var(--cream);border-color:var(--line);background:#111113}
  .admin-body{padding:22px 28px;display:grid;grid-template-columns:280px 1fr;gap:24px}
  @media (max-width:900px){.admin-body{grid-template-columns:1fr;padding:16px}}

  .stat-stack{display:flex;flex-direction:column;gap:12px}
  .stat{border:1px solid var(--line);padding:18px;background:#0f0f11}
  .stat .k{font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:.2em;color:var(--muted);text-transform:uppercase}
  .stat .v{font-family:"Bodoni Moda",serif;font-size:38px;margin-top:8px;font-weight:500;line-height:1}
  .stat .d{font-size:11px;color:var(--cream-2);margin-top:6px}

  .appts{border:1px solid var(--line);background:#0f0f11}
  .appts-head{display:flex;justify-content:space-between;align-items:center;padding:16px 18px;border-bottom:1px solid var(--line);gap:12px;flex-wrap:wrap}
  .appts-head h3{margin:0;font-family:"Bodoni Moda",serif;font-weight:500;font-size:22px}
  .filters{display:flex;gap:6px;flex-wrap:wrap}
  .filters button{padding:7px 11px;font-size:11px;letter-spacing:.12em;text-transform:uppercase;border:1px solid var(--line-2);color:var(--cream-2)}
  .filters button.on{background:var(--cream);color:var(--ink);border-color:var(--cream)}
  .appt{display:grid;grid-template-columns:60px 1.4fr 1fr 1fr auto;gap:14px;padding:16px 18px;border-top:1px solid var(--line);align-items:center}
  @media (max-width:780px){.appt{grid-template-columns:1fr;gap:8px}}
  .appt.done{opacity:.55}
  .appt .when{font-family:"Bodoni Moda",serif}
  .appt .when .d{font-size:22px;line-height:1;font-weight:500}
  .appt .when .t{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--muted);margin-top:4px;letter-spacing:.1em}
  .appt .who .n{font-size:15px;font-weight:500}
  .appt .who .svc{font-size:12px;color:var(--muted);margin-top:3px;font-family:"JetBrains Mono",monospace;letter-spacing:.08em;text-transform:uppercase}
  .appt .contact{font-size:12px;color:var(--cream-2);font-family:"JetBrains Mono",monospace;letter-spacing:.04em}
  .appt .status{font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;padding:5px 9px;border:1px solid var(--line-2);display:inline-block;text-align:center;width:fit-content}
  .appt .status.up{color:#9bc7a8;border-color:#2e7d52}
  .appt .status.dn{color:var(--muted)}
  .appt .actions{display:flex;gap:6px}
  .appt .actions button{width:36px;height:36px;border:1px solid var(--line-2);display:grid;place-items:center;transition:border .2s,background .2s}
  .appt .actions button:hover{border-color:var(--cream);background:#17171a}
  .appt .actions button.del:hover{border-color:var(--accent-2);color:var(--accent-2);background:rgba(168,49,56,.08)}
  .empty{padding:60px 20px;text-align:center;color:var(--muted);font-size:13px}

  /* login gate */
  .gate{position:fixed;inset:0;background:rgba(11,11,12,.92);backdrop-filter:blur(10px);z-index:120;display:grid;place-items:center;padding:20px}
  .gate-card{max-width:380px;width:100%;background:var(--ink);border:1px solid var(--line-2);padding:36px 28px}
  .gate-card h3{font-family:"Bodoni Moda",serif;font-weight:500;margin:0 0 6px;font-size:28px}
  .gate-card p{color:var(--muted);font-size:13px;margin:0 0 22px}
  .gate-card input{width:100%;background:transparent;border:1px solid var(--line-2);padding:14px;color:var(--cream);font-size:16px;outline:none;margin-bottom:10px}
  .gate-card input:focus{border-color:var(--cream)}
  .gate-card .hint{font-family:"JetBrains Mono",monospace;font-size:10px;color:var(--muted);letter-spacing:.15em;text-transform:uppercase;margin-top:14px;text-align:center}
  .gate-card button{width:100%;padding:14px;background:var(--cream);color:var(--ink);font-size:12px;letter-spacing:.2em;text-transform:uppercase;font-weight:700;margin-top:10px}

  /* Tweaks */
  .tweaks{position:fixed;bottom:18px;left:18px;z-index:70;background:var(--ink-2);border:1px solid var(--line-2);width:280px;padding:18px;font-size:12px;box-shadow:0 24px 60px -20px rgba(0,0,0,.8)}
  .tweaks h4{margin:0 0 12px;font-family:"Bodoni Moda",serif;font-weight:500;font-size:16px;display:flex;justify-content:space-between;align-items:center}
  .tweaks label{display:block;font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin:14px 0 6px}
  .tweaks .swatches{display:flex;gap:8px}
  .tweaks .sw{flex:1;height:34px;border:1px solid var(--line-2);cursor:pointer}
  .tweaks .sw.on{outline:1px solid var(--cream);outline-offset:2px}
  .tweaks select,.tweaks input[type=range]{width:100%;background:var(--ink);border:1px solid var(--line-2);color:var(--cream);padding:8px;font-family:inherit}

  /* mobile menu */
  .mobmenu{position:fixed;inset:0;z-index:80;background:var(--ink);display:flex;flex-direction:column;padding:20px;animation:fade .2s}
  .mobmenu .top{display:flex;justify-content:space-between;align-items:center}
  .mobmenu nav{display:flex;flex-direction:column;gap:8px;margin-top:36px}
  .mobmenu nav button{text-align:left;padding:18px 0;border-bottom:1px solid var(--line);font-family:"Bodoni Moda",serif;font-size:32px;font-weight:500;letter-spacing:-.01em}

  .divider-ticker{display:flex;overflow:hidden;border-top:1px solid var(--line);border-bottom:1px solid var(--line);background:var(--ink-2);padding:14px 0}
  .ticker-track{display:flex;gap:48px;animation:scroll 40s linear infinite;white-space:nowrap;padding-left:48px}
  @keyframes scroll{to{transform:translateX(-50%)}}
  .ticker-track span{font-family:"Bodoni Moda",serif;font-style:italic;font-size:22px;color:var(--cream-2)}
  .ticker-track span::after{content:"✦";color:var(--accent-2);margin-left:48px;font-style:normal;font-size:14px}
</style>
</head>
<body>
<div id="root"></div>

<script type="application/json" id="tweak-defaults">
{
  "accent": "#7a1f24",
  "accentLabel": "oxblood",
  "showWhatsapp": true,
  "gridDensity": "comfortable"
}
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="app.jsx"></script>
</body>
</html>
